<style>
:root{--brand:#B07969;--brand-d:#8a5c4e;--brand-l:#d4a898;--brand-xl:#f0e0d8;--sage:#d8e6d4;--sage-d:#a8c4a0;--cream:#faf7f4;--warm:#f2ebe3;--warm2:#e8ddd4;--ink:#2c1f1a;--muted:#7a6960;--border:#ddd0c8;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Karla',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
.app-header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(44,31,26,0.07);}
.header-logo{height:38px;object-fit:contain;}
.header-right{text-align:right;font-size:0.68rem;color:var(--muted);font-family:'Karla',sans-serif;letter-spacing:0.1em;text-transform:uppercase;line-height:1.7;}
.org-tabs{display:flex;background:var(--ink);padding:0 24px;overflow-x:auto;}
.org-tab{padding:13px 18px;border:none;background:transparent;font-family:'Karla',sans-serif;font-size:0.76rem;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.5);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s;}
.org-tab:hover{color:rgba(255,255,255,0.85);}
.org-tab.active{color:var(--brand-l);border-bottom-color:var(--brand-l);font-weight:600;}
.org-tab .odot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;background:rgba(255,255,255,0.18);}
.org-tab.filled .odot{background:#7aab8a;}
.preview-tab-btn{margin-left:auto;color:var(--brand-l) !important;font-weight:700 !important;border-left:1px solid rgba(255,255,255,0.1) !important;}
.sub-tabs{display:flex;background:var(--warm2);border-bottom:2px solid var(--border);padding:0 24px;overflow-x:auto;}
.sub-tab{padding:10px 15px;border:none;background:transparent;font-family:'Karla',sans-serif;font-size:0.73rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;white-space:nowrap;}
.sub-tab:hover{color:var(--ink);}
.sub-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600;}
.sub-tab .sdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;background:var(--border);}
.sub-tab.filled .sdot{background:#7aab8a;}
.content{padding:32px 36px;max-width:860px;margin:0 auto;}
.download-banner{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-d) 100%);border-radius:12px;padding:18px 22px;margin-bottom:26px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.dl-banner-text h3{font-family:'Mirador','Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:white;margin-bottom:2px;}
.dl-banner-text p{font-size:0.72rem;color:rgba(255,255,255,0.72);line-height:1.5;}
.btn-download-response{padding:11px 20px;background:white;color:var(--brand-d);border:none;border-radius:7px;font-family:'Karla',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.2s;display:flex;align-items:center;gap:7px;}
.btn-download-response:hover{background:var(--cream);}
.form-title{font-family:'Mirador','Cormorant Garamond',serif;font-size:1.75rem;font-weight:400;margin-bottom:2px;}
.form-subtitle{font-size:0.74rem;color:var(--brand);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
.form-sub{color:var(--muted);font-size:0.8rem;margin-bottom:24px;line-height:1.5;}
.section-label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--brand);margin:22px 0 11px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.section-label::before{content:'';width:16px;height:1px;background:var(--brand);display:inline-block;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:0.83rem;font-weight:500;margin-bottom:5px;}
.form-group label em{color:var(--muted);font-style:normal;font-weight:300;font-size:0.75rem;display:block;margin-top:1px;}
.form-group textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:5px;font-family:'Karla',sans-serif;font-size:0.85rem;background:var(--white);color:var(--ink);transition:border-color 0.2s;resize:vertical;min-height:76px;}
.form-group textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(176,121,105,0.1);}
.img-upload-area{border:2px dashed var(--border);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--warm);}
.img-upload-area:hover{border-color:var(--brand);background:var(--white);}
.img-upload-area input{display:none;}
.upload-icon{font-size:1.5rem;margin-bottom:4px;}
.img-upload-area p{font-size:0.77rem;color:var(--muted);}
.img-upload-area .img-note{font-size:0.68rem;color:var(--brand);margin-top:3px;font-style:italic;}
.img-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.img-preview-item{position:relative;width:80px;height:80px;border-radius:5px;overflow:hidden;border:2px solid var(--border);}
.img-preview-item img{width:100%;height:100%;object-fit:cover;}
.remove-img{position:absolute;top:2px;right:2px;background:var(--brand-d);color:white;border:none;border-radius:50%;width:17px;height:17px;font-size:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-row{display:flex;align-items:center;gap:11px;margin-top:22px;flex-wrap:wrap;}
.btn-save{padding:11px 24px;background:var(--brand);color:white;border:none;border-radius:5px;font-family:'Karla',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 0.2s;}
.btn-save:hover{background:var(--brand-d);}
.save-status{font-size:0.77rem;color:#7aab8a;font-weight:500;opacity:0;transition:opacity 0.3s;}
.save-status.show{opacity:1;}
.summarize-banner{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-d) 100%);border-radius:10px;padding:18px 22px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.summarize-banner-text h3{font-family:'Mirador','Cormorant Garamond',serif;font-size:1.1rem;font-weight:400;color:white;margin-bottom:2px;}
.summarize-banner-text p{font-size:0.72rem;color:rgba(255,255,255,0.72);line-height:1.5;}
.btn-summarize{padding:11px 20px;background:white;color:var(--brand-d);border:none;border-radius:6px;font-family:'Karla',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;white-space:nowrap;min-width:150px;text-align:center;}
.btn-summarize:hover{background:var(--cream);}
.btn-summarize:disabled{opacity:0.6;cursor:wait;}
.summary-progress{margin-top:8px;font-size:0.72rem;color:rgba(255,255,255,0.8);display:none;text-align:center;}
.sub-status-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px;}
.sub-status-pill{padding:3px 11px;border-radius:20px;font-size:0.68rem;font-weight:600;background:var(--warm);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:4px;}
.sub-status-pill.filled{background:#edf7f0;border-color:#7aab8a;color:#3d7a4e;}
.sub-status-pill .spill-dot{width:5px;height:5px;border-radius:50%;background:var(--border);}
.sub-status-pill.filled .spill-dot{background:#7aab8a;}
.summary-preview{background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:20px 22px;margin-top:18px;}
.summary-preview h4{font-family:'Mirador','Cormorant Garamond',serif;font-size:1.05rem;font-weight:400;color:var(--ink);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.summary-field{margin-bottom:11px;}
.summary-field-label{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--brand);margin-bottom:3px;}
.summary-field-val{font-size:0.84rem;color:var(--ink);line-height:1.6;background:var(--warm);padding:8px 11px;border-radius:5px;}
.summary-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center;}
.preview-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:11px;}
.preview-header h2{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;}
.btn-dl{padding:11px 24px;background:var(--brand);color:white;border:none;border-radius:5px;font-family:'Karla',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;display:flex;align-items:center;gap:7px;box-shadow:0 2px 10px rgba(176,121,105,0.28);transition:all 0.2s;min-width:160px;justify-content:center;}
.btn-dl:hover:not(:disabled){background:var(--brand-d);}
.btn-dl:disabled{opacity:0.65;cursor:wait;}
.progress-bar-wrap{width:100%;background:var(--border);border-radius:4px;height:4px;margin-top:8px;overflow:hidden;display:none;}
.progress-bar{height:4px;background:var(--brand);border-radius:4px;width:0%;transition:width 0.3s;}
.nl-pages-wrap{display:flex;flex-direction:column;gap:28px;}
.nl-page{width:794px;min-height:1123px;background:var(--cream);border-radius:3px;box-shadow:0 6px 28px rgba(44,31,26,0.14);overflow:hidden;position:relative;font-family:'Karla',sans-serif;flex-shrink:0;}
.page-badge{display:inline-block;background:var(--warm);border:1px solid var(--border);font-size:0.67rem;font-weight:500;padding:3px 10px;border-radius:20px;margin-bottom:7px;color:var(--muted);}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .big{font-size:2.8rem;margin-bottom:11px;}
#capture-area{position:fixed;left:-9999px;top:0;z-index:-1;pointer-events:none;}
</style>

<script>
const { jsPDF } = window.jspdf;
const _ld = document.getElementById('logo-data');
const LOGO_W = _ld.dataset.white;
const LOGO_C = _ld.dataset.color;

const ORGS = ['inning','karmana','act','udgam'];
const ORG_NAMES = {
  inning:'2nd Inning Handicraft Pvt Ltd', karmana:'Karmana Trust',
  act:'Animedh Charitable Trust (ACT)', udgam:'Udgam',
};
const SUBS = ['design','hr','logistics','marketing','production','sales'];
const SUB_NAMES = {
  design:'Design', hr:'HR', logistics:'Logistics',
  marketing:'Marketing & E-commerce', production:'Production', sales:'Sales',
};

// Questions — photos slot comes right after highlight (Q1)
const QS = [
  { key:'highlight', label:'Most important update this month?',
    hint:'40–50 words. E.g. Completed large export order to Italy; Started with new international client.', type:'textarea' },
  { key:'photos', label:'Add photos/images related to this update.',
    hint:'Training photos, product images, work/process pictures, event or community photos. Up to 4 images.', type:'images' },
  { key:'people',    label:'Any important people-related update?',
    hint:'E.g. Mrs. X joined as India Head; After 12 years, Mrs. Y retired.', type:'textarea' },
  { key:'ops',       label:'What changed or improved in your operations this month?',
    hint:'E.g. Reduced sampling time; Improved coordination with suppliers.', type:'textarea' },
  { key:'tools',     label:'Any new tool, system, or training introduced?',
    hint:'E.g. Started using new ERP system; Training on stitching techniques.', type:'textarea' },
  { key:'sustain',   label:'Any sustainability milestone this month?',
    hint:'E.g. Used leftover fabric for new products; Reduced plastic packaging.', type:'textarea' },
  { key:'community', label:'Any social or community update of your team?',
    hint:'E.g. Health camp conducted; Artisan bought their own house.', type:'textarea' },
  { key:'extra',     label:'Anything more you would like to add/share?',
    hint:'', type:'textarea' },
];
const Q_LABELS = {
  highlight:'Key Highlight', people:'People Update', ops:'Operations',
  tools:'Tools & Training', sustain:'Sustainability', community:'Community & Social', extra:'Additional Notes',
};

const data = {};
ORGS.forEach(org => {
  if (org === 'inning') {
    data[org] = { subs:{}, summary:null };
    SUBS.forEach(s => { data[org].subs[s] = { photos:[] }; });
  } else {
    data[org] = { photos:[] };
  }
});

let currentOrg = 'inning';
let currentSub = 'design';

// ── FORM BUILDER ──────────────────────────────────────────────────────────
function formHTML(idPrefix, orgName, subName) {
  const month = new Date().toLocaleDateString('en-IN', {month:'long', year:'numeric'});
  let h = `<div class="form-title">${orgName}</div>`;
  if (subName) h += `<div class="form-subtitle">${subName} Department</div>`;
  h += `<div class="form-sub">Fill in your monthly update below. When done, click <strong>Save</strong> then <strong>Download My Response</strong> — you'll get a Markdown (.md) file to share via WhatsApp or email.</div>`;

  // ── IDENTITY GATE ──
  h += `<div class="identity-gate">
    <div class="ig-title">&#x1F464; Who are you? (required for record-keeping)</div>
    <div class="ig-field">
      <label for="name-${idPrefix}">Your Full Name</label>
      <input type="text" id="name-${idPrefix}" placeholder="e.g. Priya Sharma" autocomplete="name">
    </div>
    <div class="ig-field">
      <label for="email-${idPrefix}">Your Email Address</label>
      <input type="email" id="email-${idPrefix}" placeholder="e.g. priya@example.com" autocomplete="email">
    </div>
    <div class="ig-note">&#x1F512; Your name and email will be recorded when you save, so your coordinator knows who submitted this update.</div>
  </div>`;

  // Download banner
  h += `<div class="download-banner">
    <div class="dl-banner-text">
      <h3>&#11015; Download &amp; Share Your Response</h3>
      <p>Downloads a <strong>.md file</strong> containing all your answers and photos — share it with your coordinator via WhatsApp or email.</p>
    </div>
    <button class="btn-download-response" onclick="downloadMD('${idPrefix}','${orgName}','${subName||''}','${month}')">
      &#11015; Download My Response (.md)
    </button>
  </div>`;

  h += `<div class="section-label">Monthly Update — ${month}</div>`;

  QS.forEach((q, qi) => {
    h += `<div class="form-group"><label>${qi+1}. ${q.label}<em>${q.hint}</em></label>`;
    if (q.type === 'textarea') {
      h += `<textarea id="${idPrefix}-${q.key}" oninput="onInput(this,'${idPrefix}','${q.key}')"></textarea>`;
    } else {
      // Photo upload — right after highlight
      h += `<div class="img-upload-area" onclick="document.getElementById('file-${idPrefix}').click()">
        <input type="file" id="file-${idPrefix}" accept="image/*" multiple onchange="handleImgs('${idPrefix}',this)">
        <div class="upload-icon">&#x1F5BC;</div>
        <p>Click to upload photos (up to 4)</p>
        <p class="img-note">All photos are embedded in your downloaded .md file — no separate attachments needed.</p>
      </div>
      <div class="img-preview" id="imgprev-${idPrefix}"></div>`;
    }
    h += `</div>`;
  });

  h += `<div class="btn-row">
    <button class="btn-save" onclick="saveSection('${idPrefix}')">Save &#10003;</button>
    <span class="save-status" id="savestatus-${idPrefix}">&#10003; Saved!</span>
  </div>`;
  return h;
}

// ── MARKDOWN DOWNLOAD ────────────────────────────────────────────────────
// The .md file embeds all images as base64 data URIs.
// When you upload it to Claude, Claude can read every field AND decode every image.
function downloadMD(idPrefix, orgName, subName, month) {
  saveSection(idPrefix);
  const [org, sub] = idPrefix.includes('-') ? idPrefix.split('-') : [idPrefix, null];
  const store = sub ? data[org].subs[sub] : data[org];
  const now = new Date().toLocaleString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});

  let md = '';
  md += `# I Was a Sari — Monthly Newsletter Response\n\n`;
  md += `**Organisation:** ${orgName}\n`;
  if (subName) md += `**Department:** ${subName}\n`;
  md += `**Month:** ${month}\n`;
  md += `**Submitted:** ${now}\n\n`;
  md += `---\n\n`;

  QS.forEach((q, qi) => {
    if (q.type === 'textarea') {
      const val = (store[q.key] || '').trim();
      md += `## Q${qi+1}. ${q.label}\n\n`;
      md += val ? `${val}\n\n` : `_No response provided._\n\n`;
    } else {
      // Embed photos as base64 markdown images — individually accessible
      const photos = store.photos || [];
      md += `## Q${qi+1}. Photos / Images\n\n`;
      if (photos.length === 0) {
        md += `_No photos uploaded._\n\n`;
      } else {
        photos.forEach((dataUri, i) => {
          // Each image is a separate markdown image tag — individually readable
          md += `**Photo ${i+1}:**\n\n`;
          md += `![Photo ${i+1} — ${orgName}${subName?' '+subName:''}](${dataUri})\n\n`;
        });
      }
    }
  });

  md += `---\n\n`;
  md += `*This file was generated by the I Was a Sari Newsletter Builder.*\n`;
  md += `*To use: Upload this .md file to Claude and ask it to build the newsletter.*\n`;

  const blob = new Blob([md], {type:'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safe = (orgName + (subName?'_'+subName:'')).replace(/[^a-zA-Z0-9]/g,'_');
  const safeM = month.replace(' ','_');
  a.href = url;
  a.download = `IWAS_Response_${safe}_${safeM}.md`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderContent() {
  const el = document.getElementById('main-content');
  const subBar = document.getElementById('sub-tabs-bar');
  if (currentOrg === 'preview') {
    subBar.style.display = 'none';
    el.innerHTML = buildPreviewPanel();
    return;
  }
  if (currentOrg === 'inning') {
    subBar.style.display = 'flex';
    if (currentSub === 'summarize') {
      el.innerHTML = buildSummarizePanel();
    } else {
      const idPrefix = `inning-${currentSub}`;
      el.innerHTML = formHTML(idPrefix, ORG_NAMES.inning, SUB_NAMES[currentSub]);
      restoreForm(idPrefix, data.inning.subs[currentSub]);
    }
  } else {
    subBar.style.display = 'none';
    el.innerHTML = formHTML(currentOrg, ORG_NAMES[currentOrg], '');
    restoreForm(currentOrg, data[currentOrg]);
  }
}

function restoreForm(idPrefix, store) {
  QS.filter(q => q.type==='textarea').forEach(q => {
    const el = document.getElementById(`${idPrefix}-${q.key}`);
    if (el && store[q.key]) el.value = store[q.key];
  });
  renderImgPrev(idPrefix, store.photos || []);
}

// ── IMAGE HANDLING ────────────────────────────────────────────────────────
function handleImgs(idPrefix, input) {
  const [org, sub] = idPrefix.includes('-') ? idPrefix.split('-') : [idPrefix, null];
  const store = sub ? data[org].subs[sub] : data[org];
  const rem = 4 - store.photos.length;
  if (rem <= 0) { alert('Max 4 photos allowed.'); return; }
  Array.from(input.files).slice(0, rem).forEach(file => {
    const r = new FileReader();
    r.onload = e => { store.photos.push(e.target.result); renderImgPrev(idPrefix, store.photos); };
    r.readAsDataURL(file);
  });
  input.value = '';
}

function renderImgPrev(idPrefix, photos) {
  const el = document.getElementById('imgprev-' + idPrefix);
  if (!el) return;
  el.innerHTML = (photos||[]).map((s,i) => `
    <div class="img-preview-item"><img src="${s}">
      <button class="remove-img" onclick="removeImg('${idPrefix}',${i})">&#x2715;</button>
    </div>`).join('');
}

function removeImg(idPrefix, i) {
  const [org, sub] = idPrefix.includes('-') ? idPrefix.split('-') : [idPrefix, null];
  const store = sub ? data[org].subs[sub] : data[org];
  store.photos.splice(i,1);
  renderImgPrev(idPrefix, store.photos);
}

// ── SAVE ──────────────────────────────────────────────────────────────────
function onInput(el, idPrefix, key) {
  const [org, sub] = idPrefix.includes('-') ? idPrefix.split('-') : [idPrefix, null];
  if (sub) data[org].subs[sub][key] = el.value;
  else data[org][key] = el.value;
}

function saveSection(idPrefix) {
  const [org, sub] = idPrefix.includes('-') ? idPrefix.split('-') : [idPrefix, null];
  const store = sub ? data[org].subs[sub] : data[org];
  QS.filter(q=>q.type==='textarea').forEach(q => {
    const el = document.getElementById(`${idPrefix}-${q.key}`);
    if (el) store[q.key] = el.value;
  });
  const st = document.getElementById('savestatus-' + idPrefix);
  if (st) { st.classList.add('show'); setTimeout(()=>st.classList.remove('show'),2200); }
  if (org==='inning') {
    if (SUBS.some(s=>hasContent(data.inning.subs[s]))) document.getElementById('orgtab-inning').classList.add('filled');
    const stab = document.getElementById('subtab-'+(sub||''));
    if (stab && hasContent(store)) stab.classList.add('filled');
  } else {
    if (hasContent(store)) document.getElementById('orgtab-'+org).classList.add('filled');
  }
  // ── FIRESTORE WRITE ──
  saveToFirestore(idPrefix, org, sub);
}

async function saveToFirestore(idPrefix, org, sub) {
  if (!window.__db) return; // Firebase not loaded yet
  const nameEl = document.getElementById('name-' + idPrefix);
  const emailEl = document.getElementById('email-' + idPrefix);
  const submitterName = nameEl ? nameEl.value.trim() : '';
  const submitterEmail = emailEl ? emailEl.value.trim() : '';
  if (!submitterName || !submitterEmail) return; // skip if identity not filled
  const store = sub ? data[org].subs[sub] : data[org];
  const month = new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const payload = {
    submitterName, submitterEmail, org, sub: sub || null,
    month, timestamp: window.__serverTimestamp(),
    orgName: ORG_NAMES[org] || org,
    subName: sub ? SUB_NAMES[sub] : null,
    highlight: store.highlight || '',
    people: store.people || '',
    ops: store.ops || '',
    tools: store.tools || '',
    sustain: store.sustain || '',
    community: store.community || '',
    extra: store.extra || '',
    photoCount: (store.photos||[]).length,
  };
  try {
    await window.__addDoc(window.__collection(window.__db, 'submissions'), payload);
    console.log('Saved to Firestore ✓', submitterName, submitterEmail);
  } catch(e) {
    console.error('Firestore error:', e.message);
  }
}

function hasContent(store) {
  return QS.filter(q=>q.type==='textarea').some(q => store[q.key]?.trim()) || (store.photos||[]).length > 0;
}

// ── AI SUMMARIZE ──────────────────────────────────────────────────────────
async function runSummarize() {
  const btn = document.getElementById('sum-btn');
  const prog = document.getElementById('sum-progress');
  if (!btn) return;
  btn.disabled=true; btn.textContent='Summarizing…'; prog.style.display='block';

  const filledSubs = SUBS.filter(s=>hasContent(data.inning.subs[s]));
  let prompt = `You are creating a monthly newsletter for "2nd Inning Handicraft Pvt Ltd", a social enterprise upcycling saris into fashion.

Synthesize the following sub-department updates into ONE unified summary. Write each field as a single cohesive paragraph — do NOT list departments separately.

Return ONLY valid JSON with keys: highlight, people, ops, tools, sustain, community, extra.
- highlight: 40-50 words, most impactful org-wide update
- All other keys: concise combined summaries in one paragraph each

Sub-department data:\n\n`;

  filledSubs.forEach(s => {
    const store = data.inning.subs[s];
    prompt += `=== ${SUB_NAMES[s]} ===\n`;
    QS.filter(q=>q.type==='textarea').forEach(q => {
      if (store[q.key]?.trim()) prompt += `${q.label}: ${store[q.key].trim()}\n`;
    });
    if ((store.photos||[]).length>0) prompt += `Photos: ${store.photos.length} photo(s) uploaded\n`;
    prompt += '\n';
  });
  prompt += '\nRespond with ONLY the JSON. No markdown, no backticks.';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
    });
    const json = await res.json();
    data.inning.summary = JSON.parse((json.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    prog.style.display='none';
    renderContent();
  } catch(err) {
    console.error(err);
    prog.textContent='Error: '+err.message;
    btn.disabled=false; btn.textContent='&#8635; Retry';
  }
}

// ── DOWNLOAD SUMMARY AS MD ────────────────────────────────────────────────
function downloadSummaryMD(month) {
  if (!data.inning.summary) return;
  const s = data.inning.summary;
  const now = new Date().toLocaleString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const filledSubs = SUBS.filter(sub=>hasContent(data.inning.subs[sub]));
  const allPhotos = [];
  filledSubs.forEach(sub => (data.inning.subs[sub].photos||[]).forEach(p=>allPhotos.push(p)));

  let md = `# I Was a Sari — Monthly Newsletter Response\n\n`;
  md += `**Organisation:** 2nd Inning Handicraft Pvt Ltd\n`;
  md += `**Type:** AI-generated summary from sub-departments: ${filledSubs.map(sub=>SUB_NAMES[sub]).join(', ')}\n`;
  md += `**Month:** ${month}\n`;
  md += `**Generated:** ${now}\n\n---\n\n`;

  Object.entries(Q_LABELS).forEach(([k,lbl]) => {
    md += `## ${lbl}\n\n${s[k]||'_No update._'}\n\n`;
  });

  if (allPhotos.length > 0) {
    md += `## Photos / Images\n\n`;
    allPhotos.slice(0,4).forEach((uri,i) => {
      md += `**Photo ${i+1}:**\n\n![Photo ${i+1} — 2nd Inning Handicraft](${uri})\n\n`;
    });
  }

  md += `---\n\n*AI summary generated by the I Was a Sari Newsletter Builder.*\n`;
  md += `*Upload this .md file to Claude to build the newsletter.*\n`;

  const blob = new Blob([md],{type:'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`IWAS_Summary_2ndInning_${month.replace(' ','_')}.md`;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
}

// ── PDF ───────────────────────────────────────────────────────────────────
async function generatePDF(){
  const btn=document.getElementById('dl-btn'),pw=document.getElementById('progress-wrap'),pb=document.getElementById('progress-bar');
  btn.disabled=true;btn.textContent='Rendering...';pw.style.display='block';pb.style.width='0%';
  try{
    const month=new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'});
    const active=[];
    if(data.inning.summary?.highlight)active.push('inning');
    ['karmana','act','udgam'].forEach(org=>{if(hasContent(data[org]))active.push(org);});
    if(!active.length){alert('No data to export.');btn.disabled=false;btn.textContent='Download PDF';pw.style.display='none';return;}
    const ca=document.getElementById('capture-area');ca.innerHTML='';
    active.forEach((org,i)=>{ca.innerHTML+=buildNLPage(org,i+1,active.length,month);});
    await new Promise(r=>setTimeout(r,900));
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    for(let i=0;i<active.length;i++){
      const el=ca.querySelector('#nl-page-'+active[i]);if(!el)continue;
      btn.textContent=`Page ${i+1} of ${active.length}...`;pb.style.width=((i/active.length)*85)+'%';
      const canvas=await html2canvas(el,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#faf7f4',logging:false,width:794,height:1123});
      if(i>0)doc.addPage();
      doc.addImage(canvas.toDataURL('image/jpeg',0.93),'JPEG',0,0,210,297);
    }
    pb.style.width='100%';
    const blob=doc.output('blob'),url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=`IWAS_Newsletter_${month.replace(' ','_')}.pdf`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    ca.innerHTML='';btn.textContent='Downloaded!';
    setTimeout(()=>{btn.disabled=false;btn.textContent='Download PDF';pw.style.display='none';},3000);
  }catch(err){console.error(err);alert('PDF error: '+err.message);btn.disabled=false;btn.textContent='Download PDF';pw.style.display='none';}
}

renderContent();
</script></body></html>
